name: Check Build

# 1. WHEN TO RUN: This triggers the build every time you push code to the 'main' branch
on:
  push:
    branches: [ "main" ]

# 2. WHAT TO DO: The actual instructions
jobs:
  build:
    # Uses the latest version of Ubuntu as the virtual machine
    runs-on: ubuntu-latest

    steps:
    # Downloads your code onto the GitHub virtual machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # Installs Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Change this if your project requires a different Node version

    # Installs your project dependencies (like running npm install)
    - name: Install Dependencies
      run: npm ci

    # Runs your build command
    - name: Run Build
      run: npm run build

      - name: Save Build Folder
      uses: actions/upload-artifact@v4
      with:
        name: my-build-files
        # IMPORTANT: Change 'dist' to whatever folder your framework outputs.
        # (e.g., 'build' for Create React App, 'dist' for Vite, '.next' for Next.js)
        path: dist/