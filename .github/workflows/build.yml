name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# IMPORTANT: These permissions are required for the workflow to push to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # --- JOB 1: BUILD THE PROJECT ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Build
        run: npm run build
        
      # This grabs your build folder and prepares it specifically for GitHub Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # CHANGE THIS if your build folder is named something else (e.g., './build' for Create React App)
          path: './dist' 

  # --- JOB 2: DEPLOY TO THE INTERNET ---
  deploy:
    # This tells GitHub to wait until the "build" job finishes successfully before deploying
    needs: build 
    runs-on: ubuntu-latest
    
    # Links this job to your GitHub Pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      # This actually pushes the compiled code to the live server
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4